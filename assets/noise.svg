<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1180"
     height="610"
     viewBox="0 0 1180 610">

    <defs>

        <filter id="noise">

            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.9"
                numOctaves="2"
                seed="7"
                result="turbulence">

                <animate
                    attributeName="seed"
                    values="7;9;11;13;7"
                    dur="20s"
                    repeatCount="indefinite"/>

            </feTurbulence>

            <feColorMatrix
                type="saturate"
                values="0"/>

            <feComponentTransfer>

                <feFuncA
                    type="table"
                    tableValues="0 0.025"/>

            </feComponentTransfer>

        </filter>

    </defs>

    <rect
        width="1180"
        height="610"
        fill="white"
        filter="url(#noise)"
        opacity="0.18"/>

</svg>
