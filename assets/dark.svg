<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1180"
     height="610"
     viewBox="0 0 1180 610"
     role="img"
     aria-label="Shreshth Verma GitHub Banner">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712">
        <animate attributeName="stop-color"
                 values="#030712;#111827;#030712"
                 dur="12s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#0F172A">
        <animate attributeName="stop-color"
                 values="#0F172A;#1E293B;#0F172A"
                 dur="12s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="accent" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animateTransform
          attributeName="gradientTransform"
          type="rotate"
          values="0 0.5 0.5;360 0.5 0.5"
          dur="18s"
          repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect width="1180"
        height="610"
        rx="32"
        fill="url(#bg)"/>

  <circle cx="180"
          cy="120"
          r="180"
          fill="#22D3EE"
          opacity=".08">
      <animate attributeName="r"
               values="180;220;180"
               dur="8s"
               repeatCount="indefinite"/>
  </circle>

  <circle cx="950"
          cy="520"
          r="200"
          fill="#7C3AED"
          opacity=".08">
      <animate attributeName="r"
               values="200;240;200"
               dur="10s"
               repeatCount="indefinite"/>
  </circle>

  <!-- Left Panel -->

  <rect x="45"
        y="45"
        width="360"
        height="520"
        rx="24"
        fill="#0F172A"
        opacity=".82"
        stroke="url(#accent)"
        stroke-opacity=".35"/>

  <g filter="url(#glow)">
    <text x="85"
          y="120"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
███████╗
    </text>

    <text x="85"
          y="145"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
██╔════╝
    </text>

    <text x="85"
          y="170"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
███████╗
    </text>

    <text x="85"
          y="195"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
╚════██║
    </text>

    <text x="85"
          y="220"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
███████║
    </text>

    <text x="85"
          y="245"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
╚══════╝
    </text>

    <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0;0 -8;0 0"
        dur="5s"
        repeatCount="indefinite"/>
  </g>

  <text x="80"
        y="325"
        font-family="monospace"
        font-size="17"
        fill="#94A3B8">
&gt; SYSTEM ONLINE
  </text>

  <text x="80"
        y="355"
        font-family="monospace"
        font-size="17"
        fill="#94A3B8">
&gt; AI MODE ENABLED
  </text>

  <!-- Right Panel -->

  <rect x="445"
        y="45"
        width="690"
        height="520"
        rx="24"
        fill="#0F172A"
        opacity=".88"
        stroke="url(#accent)"
