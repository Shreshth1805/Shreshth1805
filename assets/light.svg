<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1180"
     height="610"
     viewBox="0 0 1180 610"
     role="img"
     aria-label="Shreshth Verma GitHub Banner (Light)">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>

      <animateTransform
        attributeName="gradientTransform"
        type="rotate"
        values="0 .5 .5;360 .5 .5"
        dur="18s"
        repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

  </defs>

  <rect width="1180"
        height="610"
        rx="30"
        fill="url(#bg)"/>

  <!-- Background Glows -->

  <circle cx="170"
          cy="120"
          r="180"
          fill="#3B82F6"
          opacity=".08">
    <animate attributeName="r"
             values="180;220;180"
             dur="10s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="980"
          cy="520"
          r="200"
          fill="#10B981"
          opacity=".08">
    <animate attributeName="r"
             values="200;250;200"
             dur="9s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Left Panel -->

  <rect x="45"
        y="45"
        width="360"
        height="520"
        rx="24"
        fill="#F8FAFC"
        stroke="#E2E8F0"/>

  <g filter="url(#glow)">

    <text x="85"
          y="120"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
███████╗
    </text>

    <text x="85"
          y="145"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
██╔════╝
    </text>

    <text x="85"
          y="170"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
███████╗
    </text>

    <text x="85"
          y="195"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
╚════██║
    </text>

    <text x="85"
          y="220"
          font-family="monospace"
          font-size="18"
          fill="url(#accent)">
███████║
    </text>

    <text x="85"
