  <g font-family="Segoe UI" font-size="15">

    <rect x="490" y="430" width="95" height="34" rx="17" fill="#1E293B"/>
    <text x="512" y="452" fill="#22D3EE">Python</text>

    <rect x="600" y="430" width="95" height="34" rx="17" fill="#1E293B"/>
